<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Сторінку не знайдено | Інна Ляховська</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
  .not-found {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    background: var(--bg);
  }
  .nf-code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(80px, 18vw, 180px);
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    letter-spacing: 0.05em;
    margin-bottom: 0;
  }
  .nf-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    margin: 16px 0 12px;
    letter-spacing: 0.04em;
  }
  .nf-sub {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: rgba(248,245,240,0.45);
    letter-spacing: 0.12em;
    margin-bottom: 48px;
  }
  .nf-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .nf-btn {
    display: inline-block;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: transparent;
    transition: background 0.3s, color 0.3s;
    cursor: pointer;
  }
  .nf-btn:hover {
    background: var(--gold);
    color: var(--bg);
  }
  .nf-btn-solid {
    background: var(--gold);
    color: var(--bg);
  }
  .nf-btn-solid:hover {
    background: transparent;
    color: var(--gold);
  }
  .nf-needle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    color: rgba(184,150,90,0.2);
    margin-bottom: 24px;
    display: block;
  }
</style>
</head>
<body>

<div class="not-found">
  <span class="nf-needle">✦</span>
  <div class="nf-code">404</div>
  <div class="nf-title">Сторінку не знайдено</div>
  <div class="nf-sub">Схоже, ця нитка обірвалась...</div>
  <div class="nf-actions">
    <a href="/" class="nf-btn nf-btn-solid">На головну</a>
    <a href="/portfolio" class="nf-btn">Переглянути роботи</a>
  </div>
</div>

<canvas id="threadCanvas"></canvas>
<div class="cursor-needle" id="cursorNeedle">
  <svg width="16" height="72" viewBox="0 0 16 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ng" x1="0" y1="0" x2="16" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#9A7030"/><stop offset="28%" stop-color="#F2E0A0"/>
        <stop offset="55%" stop-color="#C8A050"/><stop offset="100%" stop-color="#7A5820"/>
      </linearGradient>
      <mask id="eyeMask">
        <rect width="16" height="72" fill="white"/>
        <ellipse cx="8" cy="60" rx="2.2" ry="3.4" fill="black"/>
      </mask>
    </defs>
    <path d="M8 0 C8.6 2 9.5 5 9.5 10 L9.5 55 C9.5 57 9 58 8 58 C7 58 6.5 57 6.5 55 L6.5 10 C6.5 5 7.4 2 8 0 Z" fill="url(#ng)" mask="url(#eyeMask)"/>
    <rect x="6.5" y="58" width="3" height="8" rx="1.5" fill="url(#ng)" mask="url(#eyeMask)"/>
    <ellipse class="needle-eye" cx="8" cy="60" rx="2.8" ry="4" fill="none" stroke="#B8965A" stroke-width="0.9"/>
    <line x1="7" y1="8" x2="7" y2="52" stroke="rgba(255,248,210,0.35)" stroke-width="0.6" stroke-linecap="round"/>
    <ellipse cx="8" cy="1.2" rx="0.6" ry="1.2" fill="rgba(255,252,230,0.9)"/>
  </svg>
</div>

<script src="/js/main.js"></script>
</body>
</html>
