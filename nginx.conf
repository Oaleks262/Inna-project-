server {
    listen 80;
    server_name inna-corset.lviv.ua www.inna-corset.lviv.ua;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name inna-corset.lviv.ua www.inna-corset.lviv.ua;

    ssl_certificate     /etc/letsencrypt/live/inna-corset.lviv.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inna-corset.lviv.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static files — serve directly (cache 30 days)
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
        root /var/www/inna-project/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Admin panel — serve static HTML
    location /admin/ {
        root /var/www/inna-project/public;
        try_files $uri $uri/ /admin/index.html;
    }

    # API — proxy to Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # File upload size limit
        client_max_body_size 20M;
    }

    # Everything else — proxy to Node (SPA fallback inside Express)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
